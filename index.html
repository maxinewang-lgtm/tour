<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>志工營隊即時語音導覽 (實戰穩定版)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f8; color: #333; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        header { text-align: center; margin-bottom: 20px; }
        .btn { font-size: 1.2rem; padding: 12px 30px; margin: 8px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s; }
        .btn-start { background-color: #28a745; color: white; }
        .btn-stop { background-color: #dc3545; color: white; }
        .btn-clear { background-color: #6c757d; color: white; }
        .btn-listener { background-color: #007bff; color: white; }
        .btn-audio { background-color: #e9ecef; color: #333; border: 2px solid #ccc; }
        .btn-audio.active { background-color: #ffc107; border-color: #d39e00; }
        #status { margin-top: 10px; font-size: 1.1rem; color: #666; font-weight: bold; }
        .columns-container { display: flex; gap: 15px; flex: 1; overflow: hidden; flex-direction: column; }
        @media (min-width: 768px) { .columns-container { flex-direction: row; } }
        .card { flex: 1; background-color: #ffffff; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; flex-direction: column; overflow: hidden; }
        .card-header { background-color: #e9ecef; padding: 10px; text-align: center; font-size: 1.1rem; font-weight: bold; border-bottom: 1px solid #dee2e6; }
        .transcript-box { flex: 1; padding: 15px; overflow-y: auto; font-size: 1.1rem; line-height: 1.5; min-height: 120px; }
        .message { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed #eee; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <div id="role-selection">
            <button onclick="startAsSpeaker()" class="btn btn-start">🎙️ 我是導覽員 (說話)</button>
            <button onclick="startAsListener()" class="btn btn-listener">🎧 我是志工聽眾 (收聽)</button>
        </div>
        
        <div id="speaker-controls" class="hidden">
            <button id="btn-start" class="btn btn-start">▶ 開始導覽</button>
            <button id="btn-stop" class="btn btn-stop" disabled>■ 停止</button>
            <button id="btn-clear" class="btn btn-clear">🗑️ 清除畫面</button>
            <div id="status">身分：導覽員。準備就緒...</div>
        </div>

        <div id="listener-controls" class="hidden">
            <p style="margin-bottom: 5px; font-weight: bold;">選擇同步口譯語音：</p>
            <button id="toggle-en" class="btn btn-audio" onclick="toggleAudio('en')">🔈 英文語音 (關)</button>
            <button id="toggle-es" class="btn btn-audio" onclick="toggleAudio('es')">🔈 西文語音 (關)</button>
            <div id="status-listener" style="margin-top: 10px; color: #666;">等待導覽員發言中...</div>
        </div>
    </header>

    <main class="columns-container">
        <div class="card"><div class="card-header">🇹🇼 中文 (Chinese)</div><div id="box-zh" class="transcript-box"></div></div>
        <div class="card"><div class="card-header">🇬🇧 英文 (English)</div><div id="box-en" class="transcript-box"></div></div>
        <div class="card"><div class="card-header">🇪🇸 西班牙文 (Spanish)</div><div id="box-es" class="transcript-box"></div></div>
    </main>

    <script>
        const firebaseConfig = { databaseURL: "https://public-demo-translation-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const dbRef = firebase.database().ref("camp_tour_live");

        const boxZh = document.getElementById('box-zh');
        const boxEn = document.getElementById('box-en');
        const boxEs = document.getElementById('box-es');
        
        let isRecognizing = false;
        let lastCountEn = 0; let lastCountEs = 0;
        let playAudioEn = false; let playAudioEs = false;

        // --- 志工聽眾功能 ---
        function startAsListener() {
            document.getElementById('role-selection').className = 'hidden';
            document.getElementById('listener-controls').className = '';
            
            const unlockUtterance = new SpeechSynthesisUtterance('');
            window.speechSynthesis.speak(unlockUtterance);

            dbRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    updateBox(boxZh, data.zh || []); updateBox(boxEn, data.en || []); updateBox(boxEs, data.es || []);
                    const currentCountEn = (data.en || []).length;
                    if (currentCountEn > lastCountEn && playAudioEn) { speakText(data.en[currentCountEn - 1], 'en-US'); }
                    lastCountEn = currentCountEn;

                    const currentCountEs = (data.es || []).length;
                    if (currentCountEs > lastCountEs && playAudioEs) { speakText(data.es[currentCountEs - 1], 'es-ES'); }
                    lastCountEs = currentCountEs;
                } else {
                    boxZh.innerHTML = ""; boxEn.innerHTML = ""; boxEs.innerHTML = "";
                    lastCountEn = 0; lastCountEs = 0;
                }
            });
        }

        function toggleAudio(lang) {
            const btn = document.getElementById(`toggle-${lang}`);
            if (lang === 'en') {
                playAudioEn = !playAudioEn;
                btn.className = playAudioEn ? 'btn btn-audio active' : 'btn btn-audio';
                btn.innerText = playAudioEn ? '🔊 英文語音 (開)' : '🔈 英文語音 (關)';
            } else if (lang === 'es') {
                playAudioEs = !playAudioEs;
                btn.className = playAudioEs ? 'btn btn-audio active' : 'btn btn-audio';
                btn.innerText = playAudioEs ? '🔊 西文語音 (開)' : '🔈 西文語音 (關)';
            }
        }

        function speakText(text, langCode) {
            if (text.includes("翻譯延遲") || text.includes("連線錯誤")) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = langCode; utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        // --- 導覽員功能 ---
        function startAsSpeaker() {
            document.getElementById('role-selection').className = 'hidden';
            document.getElementById('speaker-controls').className = '';
            
            // 【重要修改】導覽員停止監聽雲端，改為直接在本機顯示，確保畫面絕對順暢！
            dbRef.off(); 

            const btnStart = document.getElementById('btn-start');
            const btnStop = document.getElementById('btn-stop');
            const btnClear = document.getElementById('btn-clear');
            const statusText = document.getElementById('status');

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) { statusText.innerText = "瀏覽器不支援語音辨識"; return; }

            const recognition = new SpeechRecognition();
            recognition.lang = 'zh-TW';
            recognition.continuous = true;
            recognition.interimResults = false;

            btnStart.addEventListener('click', () => {
                recognition.start(); isRecognizing = true;
                btnStart.disabled = true; btnStop.disabled = false;
                statusText.innerText = "🎙️ 正在收音並廣播中...";
            });

            btnStop.addEventListener('click', () => {
                recognition.stop(); isRecognizing = false;
                btnStart.disabled = false; btnStop.disabled = true;
                statusText.innerText = "⏹️ 暫停廣播。";
            });

            btnClear.addEventListener('click', () => { 
                dbRef.set(null); 
                boxZh.innerHTML = ""; boxEn.innerHTML = ""; boxEs.innerHTML = "";
            });

            recognition.onresult = async (event) => {
                const transcript = event.results[event.resultIndex][0].transcript;
                
                // 1. 立刻在導覽員畫面印出中文與等待動畫，不用等雲端！
                appendSingleMessage(boxZh, transcript);
                const enLoading = appendSingleMessage(boxEn, "⏳ 翻譯中...");
                const esLoading = appendSingleMessage(boxEs, "⏳ 翻譯中...");

                // 2. 進行翻譯
                const enText = await translateText(transcript, 'zh-TW', 'en');
                const esText = await translateText(transcript, 'zh-TW', 'es');

                // 3. 翻譯完成，更新畫面
                enLoading.innerText = enText;
                esLoading.innerText = esText;

                // 4. 背景傳送到雲端給志工聽眾
                dbRef.once('value', (snapshot) => {
                    const data = snapshot.val() || { zh: [], en: [], es: [] };
                    if (!data.zh) data.zh = []; if (!data.en) data.en = []; if (!data.es) data.es = [];
                    data.zh.push(transcript); data.en.push(enText); data.es.push(esText);
                    dbRef.set(data);
                });
            };
            recognition.onend = () => { if (isRecognizing) recognition.start(); };
        }

        // 輔助函數：印出單筆訊息
        function appendSingleMessage(boxElement, text) {
            const div = document.createElement('div');
            div.className = 'message';
            div.innerText = text;
            boxElement.appendChild(div);
            boxElement.scrollTop = boxElement.scrollHeight;
            return div;
        }

        function updateBox(boxElement, textArray) {
            boxElement.innerHTML = "";
            textArray.forEach(text => { appendSingleMessage(boxElement, text); });
        }

        async function translateText(text, fromLang, toLang) {
            try {
                const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${fromLang}|${toLang}`;
                const response = await fetch(url);
                const data = await response.json();
                return data.responseStatus === 200 ? data.responseData.translatedText : "(翻譯額度可能已滿)";
            } catch (error) { return "(連線錯誤)"; }
        }
    </script>
</body>
</html>
