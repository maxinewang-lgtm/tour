<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>志工營隊即時語音導覽 (隨身廣播版)</title>
    <!-- 引入 Firebase 的雲端同步功能 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        header { text-align: center; margin-bottom: 20px; }
        .btn {
            font-size: 1.2rem; padding: 12px 30px; margin: 5px;
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-start { background-color: #28a745; color: white; }
        .btn-stop { background-color: #dc3545; color: white; }
        .btn-clear { background-color: #6c757d; color: white; }
        #status { margin-top: 10px; font-size: 1.1rem; color: #666; }
        
        /* 行動裝置優化：在手機上直向排列，在平版/電腦上並排 */
        .columns-container {
            display: flex; gap: 15px; flex: 1; overflow: hidden; flex-direction: column;
        }
        @media (min-width: 768px) {
            .columns-container { flex-direction: row; }
        }
        
        .card {
            flex: 1; background-color: #ffffff; border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; flex-direction: column; overflow: hidden;
        }
        .card-header {
            background-color: #e9ecef; padding: 10px; text-align: center;
            font-size: 1.1rem; font-weight: bold; border-bottom: 1px solid #dee2e6;
        }
        .transcript-box { flex: 1; padding: 15px; overflow-y: auto; font-size: 1.1rem; line-height: 1.5; min-height: 120px; }
        .message { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed #eee; }
        
        /* 隱藏區塊（給志工看的時候隱藏控制鈕） */
        .admin-only { display: none; }
    </style>
</head>
<body>

    <header>
        <!-- 身分切換：預設是志工(聽眾)，點擊才會切換成導覽員 -->
        <div id="role-selection">
            <button onclick="startAsSpeaker()" class="btn btn-start">我是導覽員 (開啟麥克風)</button>
            <p style="color:#888;">外籍志工不需點擊按鈕，直接等待畫面更新即可。</p>
        </div>
        
        <div id="speaker-controls" class="admin-only">
            <button id="btn-start" class="btn btn-start">▶ 開始導覽</button>
            <button id="btn-stop" class="btn btn-stop" disabled>■ 停止</button>
            <button id="btn-clear" class="btn btn-clear">🗑️ 清除畫面</button>
            <div id="status">準備就緒...</div>
        </div>
    </header>

    <main class="columns-container">
        <div class="card">
            <div class="card-header">🇹🇼 中文 (Chinese)</div>
            <div id="box-zh" class="transcript-box"></div>
        </div>
        <div class="card">
            <div class="card-header">🇬🇧 英文 (English)</div>
            <div id="box-en" class="transcript-box"></div>
        </div>
        <div class="card">
            <div class="card-header">🇪🇸 西班牙文 (Spanish)</div>
            <div id="box-es" class="transcript-box"></div>
        </div>
    </main>

    <script>
        // 初始化免費的公開公共測試資料庫 (供測試體驗使用)
        // 注意：公開資料庫僅供測試，正式營隊建議自行申請免費的 Firebase 帳號以保證連線品質
        const firebaseConfig = { databaseURL: "https://public-demo-translation-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const dbRef = firebase.database().ref("camp_tour_live");

        const boxZh = document.getElementById('box-zh');
        const boxEn = document.getElementById('box-en');
        const boxEs = document.getElementById('box-es');
        
        let isSpeaker = false;
        let isRecognizing = false;

        // --- 接收端邏輯：志工的手機只要一打開，就會即時監聽雲端資料庫的變化 ---
        dbRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                updateBox(boxZh, data.zh || []);
                updateBox(boxEn, data.en || []);
                updateBox(boxEs, data.es || []);
            } else {
                boxZh.innerHTML = ""; boxEn.innerHTML = ""; boxEs.innerHTML = "";
            }
        });

        function updateBox(boxElement, textArray) {
            boxElement.innerHTML = "";
            textArray.forEach(text => {
                const div = document.createElement('div');
                div.className = 'message';
                div.innerText = text;
                boxElement.appendChild(div);
            });
            boxElement.scrollTop = boxElement.scrollHeight;
        }

        // --- 發言端邏輯：只有點選「我是導覽員」的人才會觸發麥克風 ---
        function startAsSpeaker() {
            isSpeaker = true;
            document.getElementById('role-selection').style.display = 'none';
            document.getElementById('speaker-controls').style.display = 'block';
            initSpeechRecognition();
        }

        function initSpeechRecognition() {
            const btnStart = document.getElementById('btn-start');
            const btnStop = document.getElementById('btn-stop');
            const btnClear = document.getElementById('btn-clear');
            const statusText = document.getElementById('status');

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                statusText.innerText = "瀏覽器不支援語音辨識";
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'zh-TW';
            recognition.continuous = true;
            recognition.interimResults = false;

            btnStart.addEventListener('click', () => {
                recognition.start();
                isRecognizing = true;
                btnStart.disabled = true; btnStop.disabled = false;
                statusText.innerText = "🎙️ 正在將您的聲音廣播給所有志工...";
            });

            btnStop.addEventListener('click', () => {
                recognition.stop();
                isRecognizing = false;
                btnStart.disabled = false; btnStop.disabled = true;
                statusText.innerText = "⏹️ 暫停廣播。";
            });

            btnClear.addEventListener('click', () => {
                dbRef.set(null); // 清除雲端資料庫，所有志工的手機畫面會同步清空
            });

            recognition.onresult = async (event) => {
                const current = event.resultIndex;
                const transcript = event.results[current][0].transcript;

                // 呼叫翻譯
                const enText = await translateText(transcript, 'zh-TW', 'en');
                const esText = await translateText(transcript, 'zh-TW', 'es');

                // 推送到雲端資料庫
                dbRef.once('value', (snapshot) => {
                    const data = snapshot.val() || { zh: [], en: [], es: [] };
                    if (!data.zh) data.zh = []; if (!data.en) data.en = []; if (!data.es) data.es = [];
                    
                    data.zh.push(transcript);
                    data.en.push(enText);
                    data.es.push(esText);
                    
                    dbRef.set(data); // 上傳更新
                });
            };

            recognition.onend = () => { if (isRecognizing) recognition.start(); };
        }

        async function translateText(text, fromLang, toLang) {
            try {
                const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${fromLang}|${toLang}`;
                const response = await fetch(url);
                const data = await response.json();
                return data.responseStatus === 200 ? data.responseData.translatedText : "(翻譯延遲)";
            } catch (error) {
                return "(連線錯誤)";
            }
        }
    </script>
</body>
</html>
